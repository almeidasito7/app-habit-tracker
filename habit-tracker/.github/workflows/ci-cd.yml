name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'habit-tracker/**'
  pull_request:
    branches: [main]
    paths:
      - 'habit-tracker/**'

defaults:
  run:
    working-directory: habit-tracker

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            habit-tracker/frontend/package-lock.json
            habit-tracker/backend/package-lock.json

      - name: Install frontend deps
        working-directory: habit-tracker/frontend
        run: npm ci

      - name: Install backend deps
        working-directory: habit-tracker/backend
        run: npm ci

      - name: Type check frontend
        working-directory: habit-tracker/frontend
        run: npx tsc --noEmit

      - name: Type check backend
        working-directory: habit-tracker/backend
        run: npx tsc --noEmit

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: habit-tracker/frontend/package-lock.json

      - name: Install deps
        working-directory: habit-tracker/frontend
        run: npm ci

      - name: Build
        working-directory: habit-tracker/frontend
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: habit-tracker/frontend/dist

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: habit-tracker/backend/package-lock.json

      - name: Install deps
        working-directory: habit-tracker/backend
        run: npm ci

      - name: Build
        working-directory: habit-tracker/backend
        run: npm run build

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: habit-tracker/backend/dist

  docker-build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: habit-tracker/frontend
          file: habit-tracker/docker/Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/habit-tracker-frontend:latest
            ghcr.io/${{ github.repository }}/habit-tracker-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_STRIPE_PUBLIC_KEY=${{ secrets.VITE_STRIPE_PUBLIC_KEY }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: habit-tracker/backend
          file: habit-tracker/docker/Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/habit-tracker-backend:latest
            ghcr.io/${{ github.repository }}/habit-tracker-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig.yaml

      - name: Update image tags
        env:
          KUBECONFIG: kubeconfig.yaml
        run: |
          kubectl set image deployment/habit-tracker-frontend \
            frontend=ghcr.io/${{ github.repository }}/habit-tracker-frontend:${{ github.sha }} \
            -n habit-tracker

          kubectl set image deployment/habit-tracker-backend \
            backend=ghcr.io/${{ github.repository }}/habit-tracker-backend:${{ github.sha }} \
            -n habit-tracker

      - name: Verify rollout
        env:
          KUBECONFIG: kubeconfig.yaml
        run: |
          kubectl rollout status deployment/habit-tracker-frontend -n habit-tracker --timeout=120s
          kubectl rollout status deployment/habit-tracker-backend -n habit-tracker --timeout=120s
