# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: habit-tracker-backend-svc
  namespace: habit-tracker
spec:
  selector:
    app: habit-tracker-backend
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
  type: ClusterIP
---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: habit-tracker-frontend-svc
  namespace: habit-tracker
spec:
  selector:
    app: habit-tracker-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: habit-tracker-ingress
  namespace: habit-tracker
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - habit-tracker.yourdomain.com
      secretName: habit-tracker-tls
  rules:
    - host: habit-tracker.yourdomain.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: habit-tracker-backend-svc
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: habit-tracker-frontend-svc
                port:
                  number: 80
---
# Secret template (fill in your values and apply with kubectl)
apiVersion: v1
kind: Secret
metadata:
  name: habit-tracker-secrets
  namespace: habit-tracker
type: Opaque
stringData:
  SUPABASE_URL: "https://your-project.supabase.co"
  SUPABASE_SERVICE_KEY: "your-service-role-key"
  SUPABASE_ANON_KEY: "your-anon-key"
  OPENAI_API_KEY: "sk-your-openai-api-key"
  STRIPE_SECRET_KEY: "sk_live_your-stripe-key"
  STRIPE_WEBHOOK_SECRET: "whsec_your-webhook-secret"
  JWT_SECRET: "your-super-secret-jwt-key"
