apiVersion: apps/v1
kind: Deployment
metadata:
  name: habit-tracker-frontend
  namespace: habit-tracker
  labels:
    app: habit-tracker-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: habit-tracker-frontend
  template:
    metadata:
      labels:
        app: habit-tracker-frontend
    spec:
      containers:
        - name: frontend
          image: habit-tracker-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
