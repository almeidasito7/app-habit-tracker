apiVersion: apps/v1
kind: Deployment
metadata:
  name: habit-tracker-backend
  namespace: habit-tracker
  labels:
    app: habit-tracker-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: habit-tracker-backend
  template:
    metadata:
      labels:
        app: habit-tracker-backend
    spec:
      containers:
        - name: backend
          image: habit-tracker-backend:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: habit-tracker-secrets
                  key: SUPABASE_URL
            - name: SUPABASE_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: habit-tracker-secrets
                  key: SUPABASE_SERVICE_KEY
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: habit-tracker-secrets
                  key: SUPABASE_ANON_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: habit-tracker-secrets
                  key: OPENAI_API_KEY
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: habit-tracker-secrets
                  key: STRIPE_SECRET_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: habit-tracker-secrets
                  key: STRIPE_WEBHOOK_SECRET
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: habit-tracker-secrets
                  key: JWT_SECRET
            - name: FRONTEND_URL
              value: "https://habit-tracker.yourdomain.com"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: habit-tracker-backend-hpa
  namespace: habit-tracker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: habit-tracker-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
